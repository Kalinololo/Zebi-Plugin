main: plugin.HungerGames
name: Zebiiii
version: 1.0
author: Kalinolololololololololololo & Triplololololololololololo
description: Un plugin de bg zeubi

commands:
  kit:
    description: Selectionne ton kit
    usage: /kit

  surfacerandom:
    description: Go to the surface at a random X
    usage: /surfacerandom

  ez:
    description: gn all
    usage: /ez

  fiou:
    description: Youhou des porcelets !
    usage: /fiou <number>

  cworld:
    description: Create a world
    usage: /cworld <worldname>

  dworld:
    description: Delete a world
    usage: /dworld <worldname>

  gworld:
    description: Go to a world
    usage: /gworld <worldname>

  lworld:
    description: List worlds
    usage: /lworld

  c:
    description: Set gamemode CREATIVE
    usage: /c

  s:
    description: Set gamemode SURVIVAL
    usage: /s

  sp:
    description: Set gamemode SPECTATOR
    usage: /sp

  kits:
    description: Give a Kit Selector
    usage: /kits

  fly:
    description: Enable/Disable fly
    usage: /fly

  hg:
    description: Interact with the actual party
    usage: /hg <action>